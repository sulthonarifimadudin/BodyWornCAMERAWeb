server {
    listen 80;
    server_name bodyworncamera.sbs www.bodyworncamera.sbs;
    
    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bodyworncamera.sbs www.bodyworncamera.sbs;

    ssl_certificate /etc/letsencrypt/live/bodyworncamera.sbs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bodyworncamera.sbs/privkey.pem;

    # SSL Optimization (Optional but recommended)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router DOM (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to mediamtx for HLS streaming (Secure via Nginx)
    location /mediamtx/ {
        proxy_pass http://mediamtx:8888/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers for HLS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }

    # Reverse proxy to backend API container
    location /api/ {
        proxy_pass http://api-server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
