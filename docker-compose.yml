version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      # Menggunakan konfigurasi tanpa password seperti default Laragon/XAMPP teman Anda
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: guardwatch_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Auto-import sql file
      - ./guardwatch_db.sql:/docker-entrypoint-initdb.d/guardwatch_db.sql
    healthcheck:
      # Ping tanpa password karena empty password diizinkan
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s # Memberi waktu ekstra bagi MySQL VPS untuk Setup awal

  api-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-server
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql-db
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=guardwatch_db
      - PORT=3000
    env_file:
      - ./backend/.env
    depends_on:
      mysql-db:
        condition: service_healthy

  web-client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api-server

volumes:
  db_data:
