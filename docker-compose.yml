version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      # Menggunakan konfigurasi tanpa password seperti default Laragon/XAMPP teman Anda
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: guardwatch_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - db_data:/var/lib/mysql
      # Auto-import sql file
      - ./guardwatch_db_utf8.sql:/docker-entrypoint-initdb.d/guardwatch_db.sql

  api-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-server
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql-db
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=guardwatch_db
      - PORT=3000

    env_file:
      - ./backend/.env
    depends_on:
      mysql-db:
        condition: service_healthy

  web-client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-client
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api-server

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: always
    ports:
      - "1484:1484" # RTMP Input
      - "1485:1485" # RTSP
      - "8888:8888" # HLS Output
    environment:
      - MTX_RTMPADDRESS=:1484
      - MTX_RTSPADDRESS=:1485
      - MTX_HLSADDRESS=:8888
      - MTX_WEBRTC=no # Disable WebRTC to save resources

volumes:
  db_data:
