version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      # Password Root MySQL (Untuk keamanan ubah pada saat produksi)
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root} 
      MYSQL_DATABASE: guardwatch_db
    ports:
      - "3306:3306"
    volumes:
      # Data persisten MySQL agar tidak hilang saat container mati
      - db_data:/var/lib/mysql
      # Skrip backup sql dieksekusi otomatis pertama kali
      - ./guardwatch_db.sql:/docker-entrypoint-initdb.d/guardwatch_db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-server
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Memaksa host DB menjadi nama container ditiap jaringan docker
      - DB_HOST=mysql-db
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - DB_NAME=guardwatch_db
      - PORT=3000
    env_file:
      - ./backend/.env
    depends_on:
      mysql-db:
        condition: service_healthy

  web-client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api-server

volumes:
  db_data:
